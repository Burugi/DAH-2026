# 멀티에이전트 blue brain 비교 실험
# rule-red (가장 강한 공격자) vs 7가지 blue 방어 방식 비교
# blue: rule / llm / rl / react / reflect / plan / ooda
name: multiagent
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2, 3, 4]

red_types:  [rule]
blue_types: [rule, llm, rl, react, reflect, plan, ooda]

sim:
  starting_num_red: 3
  red_spawn_rate: 0.20
  max_length_data_links: 40

defense:
  detector: multisensor
  snr_thresh: 6
  gps_thresh: 8
  response: safe_mode

attacks:
  - {type: jam,       targets: [0, 1, 2, 3], t: [10, 25], drop: 22}
  - {type: gps_spoof, targets: [12, 13],     t: [15, 35], drift: 3.0}
