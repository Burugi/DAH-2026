# 혼성 함대(UAV12+UGV6) 위에 재밍 + GPS 스푸핑 + 펌웨어 웜 전파를 함께 거는 시나리오.
# entity index: 0-11 = UAV, 12-17 = UGV
name: combined
env: B
fleet:
  n_uav: 12
  n_ugv: 6
  grid: 100
  max_link: 40          # 합성 함대 통신 도달거리(라벨링용 참고값)
steps: 40
seeds: [0, 1, 2]

sim:                     # B(DroneSwarm) 네트워크 시뮬 설정 (펌웨어 익스플로잇/웜은 여기서 실현)
  red_class: RedDroneWorm        # RedDroneWorm | DroneRedAgent
  starting_num_red: 1
  red_spawn_rate: 0.05
  max_length_data_links: 40

blue:
  policy: random         # random | sleep  (방어 미정 → 당분간 비학습 정책)

attacks:                 # 합성 오버레이 공격(재밍/GPS는 sim 밖, ground-truth 라벨)
  - {type: jam,        targets: [0, 1, 2, 3],   t: [10, 25], drop: 22}   # UAV 4대 재밍
  - {type: gps_spoof,  targets: [12, 13],        t: [15, 35], drift: 3.0} # UGV 2대 위치 위조
