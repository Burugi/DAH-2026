# 데모 대시보드 생성용 sweep (rule / hier_h2 / hier_h3_tight 비교)
name: champion_demo
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2]

red_types: [rule]

blue_types:
  - rule
  - hier_h2
  - hier_h3_tight

sim:
  starting_num_red: 3
  red_spawn_rate: 0.20
  max_length_data_links: 40

defense:
  detector: multisensor
  snr_thresh: 6
  gps_thresh: 8
  response: safe_mode
