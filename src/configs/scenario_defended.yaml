# 방어 ON: blue=react(침해 드론 세션 제거) + 텔레메트리 방어(multisensor 탐지 + safe_mode 보정)
name: defended
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2]
sim: {red_class: RedDroneWorm, starting_num_red: 3, red_spawn_rate: 0.20, max_length_data_links: 40}
blue: {policy: react}              # sleep|random|remove|retake|react
defense:
  detector: multisensor            # none|threshold|multisensor
  snr_thresh: 6
  gps_thresh: 8
  response: safe_mode              # none|safe_mode|isolate
attacks:
  - {type: jam,       targets: [0,1,2,3], t: [10,25], drop: 22}
  - {type: gps_spoof, targets: [12,13],   t: [15,35], drift: 3.0}
