# red 변형: DroneRedAgent(FSM) + blue=remove(상시 세션 제거) + threshold 탐지/isolate 대응
name: fsm_red
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2]
sim: {red_class: DroneRedAgent, starting_num_red: 2, red_spawn_rate: 0.10, max_length_data_links: 40}
blue: {policy: remove}
defense:
  detector: threshold              # jam만 탐지(GPS는 단일센서로 불가 -> multisensor 필요함을 대비)
  snr_thresh: 6
  gps_thresh: 8
  response: isolate
attacks:
  - {type: jam,       targets: [4,5,6],  t: [8,22],  drop: 25}
  - {type: gps_spoof, targets: [14,15],  t: [12,30], drift: 4.0}
