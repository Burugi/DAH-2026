# Scenario S4 — GPS-Heavy
# GPS 스푸핑 중심 공격: 많은 드론에 강한 drift, 재밍은 약함
name: s4_gps
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2, 3, 4]

red_types:  [rule]
blue_types:
  - rule
  - llm
  - rl
  - react_k2
  - react
  - react_k10
  - reflect_r4
  - reflect
  - reflect_r12
  - plan_t20
  - plan
  - plan_t65
  - ooda_w3
  - ooda
  - ooda_w8

sim:
  starting_num_red: 3
  red_spawn_rate: 0.20
  max_length_data_links: 40

defense:
  detector: multisensor
  snr_thresh: 6
  gps_thresh: 4             # GPS 탐지 임계값 강화 (민감하게)
  response: safe_mode

attacks:
  - {type: jam,       targets: [0],              t: [20, 30], drop: 10}    # 약한 재밍
  - {type: gps_spoof, targets: [10, 11, 12, 13, 14, 15], t: [5, 40], drift: 6.0}  # 강한 GPS
