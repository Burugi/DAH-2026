# Scenario S5 — Jam-Heavy
# 재밍 중심 공격: 넓은 범위 + 강한 SNR 저하, GPS는 없음
name: s5_jam
env: B
fleet: {n_uav: 12, n_ugv: 6, grid: 100, max_link: 40}
steps: 40
seeds: [0, 1, 2, 3, 4]

red_types:  [rule]
blue_types:
  - rule
  - llm
  - rl
  - react_k2
  - react
  - react_k10
  - reflect_r4
  - reflect
  - reflect_r12
  - plan_t20
  - plan
  - plan_t65
  - ooda_w3
  - ooda
  - ooda_w8

sim:
  starting_num_red: 3
  red_spawn_rate: 0.20
  max_length_data_links: 40

defense:
  detector: multisensor
  snr_thresh: 4             # 재밍 탐지 임계값 강화 (민감하게)
  gps_thresh: 8
  response: safe_mode

attacks:
  - {type: jam, targets: [0, 1, 2, 3, 4, 5, 6, 7], t: [8, 40], drop: 30}  # 광범위 강한 재밍
