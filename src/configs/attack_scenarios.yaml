# HVT 하네스용 공격 시나리오 정의.
# 각 시나리오는 sim 파라미터의 조합. harness가 해석해 red 정책 + 오버레이로 구현한다.
#
# 파라미터:
#   vectors    : 공격 레인 리스트 — W(웜 Exploit+전파) / J(재밍 FloodBandwidth) / B(차단 BlockTraffic)
#   inject     : true면 감염 드론이 이웃 가용성 드레인(위조 명령)
#   frag_K     : 상위 K개 허브 제거 = 연결성 분할
#   blackout_p : 위성 단절 — p 비율 노드 도달불가
#   detector_q : 탐지 저하 — 코디네이터가 감염을 보는 확률(1.0=완전관측)
#   poison_q   : Sybil/합의 오염 — 탐지 회피 확률
#   tempo      : 은밀/저속 — 매 스텝 행동할 확률(1.0=매 스텝)
#   start_red  : 내부자 — 초기 감염 드론 수
#   class      : 위협 클래스(연결성/가용성/탐지/점령)

scenarios:
  - {id: A1,     name: 공급망 웜,          vectors: [W],       class: 점령}
  - {id: A2,     name: MAVLink 주입,       vectors: [W],       inject: true,                 class: 점령}
  - {id: A3,     name: GPS 스푸핑,         vectors: [J],       class: 가용성}
  - {id: A4,     name: SATCOM MITM,        vectors: [W],       blackout_p: 0.3,              class: 연결성}
  - {id: A5,     name: ROS2/DDS 인젝션,    vectors: [W],       class: 점령}
  - {id: A6,     name: 센서 스푸핑,        vectors: [J],       class: 가용성}
  - {id: A7,     name: RF 재밍,            vectors: [J],       class: 가용성}
  - {id: A8,     name: C2 deauth,          vectors: [B],       class: 점령}
  - {id: A9,     name: OTA 펌웨어,         vectors: [W],       class: 점령}
  - {id: A10,    name: Sybil/비잔틴,       vectors: [W],       poison_q: 0.5,                class: 점령}
  - {id: A11,    name: 적대적 ML,          vectors: [W],       detector_q: 0.5,              class: 탐지}
  - {id: A12,    name: 임베디드 사이드채널, vectors: [W],       tempo: 0.5, detector_q: 0.6,  class: 점령}
  - {id: A13,    name: PNT/시간동기,       vectors: [J],       class: 가용성}
  - {id: A14,    name: 다영역 협조,        vectors: [W, J, B], class: 점령}
  - {id: A15,    name: 내부자 위협,        vectors: [W],       start_red: 3, detector_q: 0.5, class: 탐지}
  - {id: A16,    name: ISR 데이터 탈취,    vectors: [W],       tempo: 0.3, detector_q: 0.6,  class: 점령}
  - {id: A17,    name: 스웜 C2 탈취,       vectors: [W],       frag_K: 2,                    class: 연결성}
  - {id: A18,    name: SwarmFuzz,          vectors: [W],       frag_K: 3,                    class: 연결성}
  - {id: A19,    name: Raven(은밀),        vectors: [W],       inject: true, tempo: 0.4,     class: 점령}
  - {id: A20,    name: Incalmo(LLM자율),   vectors: [W, J, B], class: 점령}
  - {id: A21,    name: VLM 프롬프트인젝션, vectors: [W],       detector_q: 0.5,              class: 탐지}
  - {id: A-MV,   name: 동시 멀티벡터,      vectors: [W, J, B], class: 점령/가용성}
  - {id: A-CONN, name: 연결성 단절,        vectors: [W, J, B], frag_K: 4,                    class: 연결성}
