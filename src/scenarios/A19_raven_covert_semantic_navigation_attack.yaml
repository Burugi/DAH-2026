id: A19
name: raven_covert_semantic_navigation_attack

description: >
  Based on Raven (USENIX Security 2025): temporal-logic and probabilistic
  optimisation finds the minimal GPS injection that keeps all sensor readings
  within noise bounds and maintains spatio-temporal consistency, defeating
  threshold-based and IMU cross-check detectors while still collapsing swarm
  navigation semantics with as few as one injection event.

mitre_attack:
  - T1565   # Data Manipulation (sub-noise-floor GPS manipulation)
  - T1562   # Impair Defenses (crafted to evade threshold and IMU cross-check)

attacks:
  # Drift is set just below the default gps_thresh to evade multisensor detector
  # but above zero to accumulate navigational error over time
  - type: gps_spoof
    targets: [0, 1, 2]
    t: [4, 40]
    drift: 0.5            # 0.5 m/step: below gps_thresh=8 for ~16 steps before detection

  # Second pulse: different drones, staggered to avoid pattern detection
  - type: gps_spoof
    targets: [4, 5, 6]
    t: [14, 40]
    drift: 0.5

red_hint: [1, 3, 0]    # DiscoverDrones, ExploitRandom, Sleep (minimal footprint)

defense:
  # Standard threshold/multisensor detectors are insufficient (that is the point).
  # Recommended: CUSUM or chi-squared sequential test with tight window.
  detector: multisensor
  snr_thresh: 6.0
  gps_thresh: 2.0         # must be lowered to catch sub-threshold drift
  canary_recall: 0.42     # sub-noise injection evades canary heartbeat checks
  canary_fp: 0.18         # tight gps_thresh causes many FPs from normal noise
  response: safe_mode
