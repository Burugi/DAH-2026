id: A3
name: gps_spoofing_navigation_deception

description: >
  Adversary broadcasts forged GNSS signals to progressively offset reported
  drone positions, inducing geofence bypass or guided mis-landing while
  keeping drones airborne (availability preserved) and the offset rate low
  enough to evade INS cross-check thresholds.

mitre_attack:
  - T1565   # Data Manipulation (false position reporting)
  - T1499   # Endpoint Denial of Service (navigation degradation)

attacks:
  # UAV cluster: slow progressive offset on lead formation drones
  - type: gps_spoof
    targets: [0, 1, 2]
    t: [8, 40]
    drift: 0.9          # 0.9 m/step: stays inside default gps_thresh=8 for ~8 steps

  # UGV pair: spoofed to deviate from road corridor
  - type: gps_spoof
    targets: [12, 13]
    t: [12, 40]
    drift: 1.1

red_hint: [1, 3, 4]    # DiscoverDrones, ExploitRandom, ExploitFarthest

defense:
  detector: multisensor
  snr_thresh: 6.0
  gps_thresh: 4.0       # tightened to catch slow drift before cascade
  canary_recall: 0.78
  canary_fp: 0.04
  response: safe_mode
